<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asset Network</title>

<style>
    body {
        margin: 0;
        background: #0b0f17;
        font-family: 'Inter', system-ui, sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }

    svg {
        width: 1100px;
        max-width: 95vw;
        height: auto;
        filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
    }

    .line {
        stroke: rgba(255,255,255,0.13);
        stroke-width: 3;
        stroke-dasharray: 12 8;
        animation: dash 10s linear infinite;
    }

    @keyframes dash {
        to { stroke-dashoffset: -40; }
    }

    .asset {
        cursor: pointer;
        transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center;
    }

    .asset:hover {
        transform: scale(1.085);
    }

    .asset-image {
        transition: filter 0.4s ease;
    }

    .asset:hover .asset-image {
        filter: brightness(1.18) contrast(1.12) saturate(1.25);
    }

    .asset-ring {
        fill: none;
        stroke-width: 5.5;
        transition: stroke-width 0.4s cubic-bezier(0.23, 1, 0.32, 1), 
                    filter 0.4s ease;
    }

    .asset:hover .asset-ring {
        stroke-width: 8.5;
        filter: drop-shadow(0 0 22px currentColor);
    }

    .asset-pulse {
        fill: none;
        stroke: currentColor;
        stroke-width: 2.5;
        opacity: 0.22;
        animation: pulse 4.2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { r: 74; opacity: 0.18; }
        50% { r: 85; opacity: 0.38; }
    }

    .label {
        fill: #e2e8f0;
        font-size: 15.5px;
        font-weight: 600;
        letter-spacing: 2.8px;
        text-anchor: middle;
        pointer-events: none;
        transition: all 0.3s ease;
        text-transform: uppercase;
    }

    .asset:hover .label {
        fill: white;
        font-size: 17px;
    }

    /* Leaderboard */
    .leaderboard {
        margin: 40px 0 20px;
        width: 100%;
        max-width: 520px;
        background: #161b2b;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.08);
        padding: 25px 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .leaderboard h3 {
        text-align: center;
        margin: 0 0 20px 0;
        font-size: 22px;
        color: #a5b4fc;
        letter-spacing: 3px;
    }

    .leaderboard-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .leader-item {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 14px 18px;
        margin-bottom: 8px;
        background: rgba(255,255,255,0.03);
        border-radius: 12px;
        transition: all 0.3s ease;
    }

    .leader-item:hover {
        background: rgba(139, 92, 246, 0.15);
        transform: translateX(8px);
    }

    .rank {
        width: 32px;
        height: 32px;
        background: #334155;
        color: #e0e7ff;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 15px;
    }

    .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1e2937; }
    .rank-2 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #1e2937; }
    .rank-3 { background: linear-gradient(135deg, #cd7f32, #b45309); color: white; }

    .leader-name {
        flex: 1;
        font-weight: 600;
    }

    .leader-amount {
        font-family: monospace;
        color: #67e8f9;
        font-weight: 700;
    }

    .trophy {
        font-size: 22px;
    }

    /* Modal */
    #modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(11, 15, 23, 0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(12px);
    }

    .modal-content {
        background: #161b2b;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        width: 90%;
        max-width: 480px;
        padding: 50px 40px;
        text-align: center;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .modal-content h2 {
        font-size: 28px;
        margin: 0 0 16px 0;
        color: #a5b4fc;
    }

    .modal-content p {
        font-size: 17px;
        opacity: 0.8;
        line-height: 1.6;
        margin: 8px 0;
    }

    .modal-list {
        text-align: left;
        display: inline-block;
        margin: 20px 0;
        font-size: 16px;
        opacity: 0.9;
    }

    .close-btn {
        margin-top: 30px;
        padding: 12px 32px;
        background: transparent;
        border: 1px solid #64748b;
        color: #cbd5e1;
        border-radius: 9999px;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .close-btn:hover {
        background: #334155;
        border-color: #94a3b8;
        color: white;
    }

    .donate-section {
        margin-top: 35px;
        padding-top: 25px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .donate-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #1e2937;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 9999px;
        font-size: 15px;
        margin: 8px 4px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .donate-btn:hover {
        background: #334155;
        transform: translateY(-2px);
    }

    .title {
        position: absolute;
        top: 40px;
        font-size: 29px;
        font-weight: 700;
        letter-spacing: 7px;
        opacity: 0.95;
        text-transform: uppercase;
    }

    .footer {
        margin-top: 25px;
        opacity: 0.8;
        font-size: 13.8px;
        letter-spacing: 1px;
        text-align: center;
    }
</style>
</head>

<body>

<div class="title">Sustainable Asset Network</div>

<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">

    <!-- Connections -->
    <line class="line" x1="260" y1="420" x2="550" y2="180"/>
    <line class="line" x1="550" y1="180" x2="840" y2="420"/>
    <line class="line" x1="260" y1="420" x2="840" y2="420"/>

    <defs>
        <clipPath id="clipAquatics">
            <circle cx="260" cy="420" r="74"/>
        </clipPath>
        <clipPath id="clipData">
            <circle cx="550" cy="180" r="84"/>
        </clipPath>
        <clipPath id="clipNursery">
            <circle cx="840" cy="420" r="66"/>
        </clipPath>
    </defs>

    <!-- AQUATICS -->
    <g class="asset" id="aquatics">
        <image 
            href="https://images.unsplash.com/photo-1544551763-46a013bb70d5" 
            x="186" y="346" width="148" height="148"
            clip-path="url(#clipAquatics)"
            preserveAspectRatio="xMidYMid slice"
            class="asset-image"
        />
        <circle class="asset-ring" cx="260" cy="420" r="74" stroke="#22d3ee"/>
        <circle class="asset-pulse" cx="260" cy="420" r="74" stroke="#22d3ee"/>
        <text class="label" x="260" y="528">AQUATICS</text>
    </g>

    <!-- DATA -->
    <g class="asset" id="data">
        <image 
            href="https://images.unsplash.com/photo-1551288049-bebda4e38f71" 
            x="466" y="96" width="168" height="168"
            clip-path="url(#clipData)"
            preserveAspectRatio="xMidYMid slice"
            class="asset-image"
        />
        <circle class="asset-ring" cx="550" cy="180" r="84" stroke="#8b5cf6"/>
        <circle class="asset-pulse" cx="550" cy="180" r="84" stroke="#8b5cf6"/>
        <text class="label" x="550" y="292">DATA</text>
    </g>

    <!-- NURSERY -->
    <g class="asset" id="nursery">
        <image 
            href="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735" 
            x="774" y="354" width="132" height="132"
            clip-path="url(#clipNursery)"
            preserveAspectRatio="xMidYMid slice"
            class="asset-image"
        />
        <circle class="asset-ring" cx="840" cy="420" r="66" stroke="#34d399"/>
        <circle class="asset-pulse" cx="840" cy="420" r="66" stroke="#34d399"/>
        <text class="label" x="840" y="518">NURSERY</text>
    </g>

</svg>

<!-- FUN DONOR LEADERBOARD -->
<div class="leaderboard">
    <h3>🐟 HALL OF FAME 🐟</h3>
    <ul class="leaderboard-list" id="leaderboard-list">
        <!-- Populated by JavaScript -->
    </ul>
    <p style="text-align:center; margin-top:18px; font-size:13px; opacity:0.7;">
        Thank you legends • Real-time updates coming soon
    </p>
</div>

<div class="footer">
    Click nodes to explore • Unified scaling • Premium hover feedback
</div>

<!-- Modal -->
<div id="modal">
    <div class="modal-content">
        <h2 id="modal-title">Asset Details</h2>
        <p id="modal-asset-name" style="font-size:22px; font-weight:600; margin:20px 0 10px;"></p>
        
        <div id="modal-content-area">
            <!-- Dynamic content injected here by JS -->
        </div>

        <div class="donate-section">
            <p style="margin-bottom:15px; opacity:0.85;">Help us grow the network</p>
            <div>
                <button class="donate-btn" onclick="copyAddress('BTC')">BTC</button>
                <button class="donate-btn" onclick="copyAddress('ETH')">ETH</button>
                <button class="donate-btn" onclick="copyAddress('SOL')">SOL</button>
            </div>
            <small style="margin-top:12px; display:block; opacity:0.6;">Addresses copied to clipboard</small>
        </div>

        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    // ==================== LEADERBOARD DATA ====================
    const donors = [
        { rank: 1, name: "AquaWhale.eth", amount: "$2,450", emoji: "🐋" },
        { rank: 2, name: "PondLegend42", amount: "$1,890", emoji: "🌊" },
        { rank: 3, name: "TilapiaKing", amount: "$1,250", emoji: "🐟" },
        { rank: 4, name: "BluegillBoss", amount: "$980", emoji: "🐠" },
        { rank: 5, name: "CryptoKoi", amount: "$750", emoji: "🎏" },
        { rank: 6, name: "SustainableFin", amount: "$620", emoji: "🌱" },
        { rank: 7, name: "FryFundraiser", amount: "$410", emoji: "🐣" }
    ];

    function renderLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';

        donors.forEach(donor => {
            const li = document.createElement('li');
            li.className = 'leader-item';
            li.innerHTML = `
                <div class="rank ${donor.rank === 1 ? 'rank-1' : donor.rank === 2 ? 'rank-2' : donor.rank === 3 ? 'rank-3' : ''}">${donor.rank}</div>
                <span class="trophy">${donor.emoji}</span>
                <span class="leader-name">${donor.name}</span>
                <span class="leader-amount">${donor.amount}</span>
            `;
            list.appendChild(li);
        });
    }

    // ==================== DONATION ADDRESSES ====================
    function copyAddress(crypto) {
        let address = '';
        if (crypto === 'BTC') address = 'bc1qt7920ytslkkvkx6rcmffclgknvurn8umpuuz3g';
        else if (crypto === 'ETH') address = '0x73Fe0f0Fa44035607b9ddB5Ba560301Ae7C96a54';
        else if (crypto === 'SOL') address = '4CYdS9QxVS9tRYtkoi6WKNs1wYL81uSjAjrmjtJ2vT7A';
        
        navigator.clipboard.writeText(address).then(() => {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Copied!';
            setTimeout(() => btn.textContent = originalText, 1800);
        });
    }

    // ==================== MODAL LOGIC ====================
    const assets = document.querySelectorAll('.asset');
    const modal = document.getElementById('modal');
    const modalName = document.getElementById('modal-asset-name');
    const modalContentArea = document.getElementById('modal-content-area');

    assets.forEach(asset => {
        asset.addEventListener('click', () => {
            const id = asset.id;
            let name = '';
            let html = '';

            if (id === 'aquatics') {
                name = 'Aquatics Fund';
                html = `
                    <div class="modal-list">
                        <p><strong>Livestock Species Breeding:</strong> 5</p>
                        <p><strong>Plant Species:</strong> 7</p>
                        <p><strong>Indoor Aquarium Space:</strong> ~700 Gallons</p>
                        <p><strong>Outdoor Pond Space:</strong> 2× 1,000 gal</p>
                    </div>
                    <p style="font-size:15px; margin-top:20px;">Growth estimates and feast planning coming soon.</p>
                `;
            } 
            else if (id === 'data') {
                name = 'Data Vault';
                html = `
                    <div class="modal-list">
                        <p><strong>Blockchain Activity</strong></p>
                        <p><strong>Email Lists</strong></p>
                        <p><strong>Social Media Activity</strong></p>
                        <p><strong>SMS Lists</strong></p>
                        <p style="margin-top:20px; opacity:0.7;">Coming Soon...</p>
                    </div>
                `;
            } 
            else if (id === 'nursery') {
                name = 'Premium Nursery';
                html = `
                    <div class="modal-list">
                        <p><strong>Landscaping Plant Species:</strong> 4</p>
                        <p><strong>Tree Species:</strong> 1</p>
                    </div>
                    <p style="font-size:15px; margin-top:20px;">Expansion plans coming soon.</p>
                `;
            }

            modalName.textContent = name;
            modalContentArea.innerHTML = html;
            modal.style.display = 'flex';
        });
    });

    function closeModal() {
        modal.style.display = 'none';
    }

    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    // Initialize everything
    renderLeaderboard();
</script>

</body>
</html>
