<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asset Network — Web3 Launch</title>

<style>
    body {
        margin: 0;
        background: #0b0f17;
        font-family: 'Inter', system-ui, sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }

    svg {
        width: 1100px;
        max-width: 95vw;
        height: auto;
        filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
    }

    .line {
        stroke: rgba(255,255,255,0.13);
        stroke-width: 3;
        stroke-dasharray: 12 8;
        animation: dash 10s linear infinite;
    }

    @keyframes dash {
        to { stroke-dashoffset: -40; }
    }

    .asset {
        cursor: pointer;
        transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center;
    }

    .asset:hover {
        transform: scale(1.085);
    }

    .asset-image {
        transition: filter 0.4s ease;
    }

    .asset:hover .asset-image {
        filter: brightness(1.18) contrast(1.12) saturate(1.25);
    }

    .asset-ring {
        fill: none;
        stroke-width: 5.5;
        transition: stroke-width 0.4s cubic-bezier(0.23, 1, 0.32, 1), 
                    filter 0.4s ease;
    }

    .asset:hover .asset-ring {
        stroke-width: 8.5;
        filter: drop-shadow(0 0 22px currentColor);
    }

    .asset-pulse {
        fill: none;
        stroke: currentColor;
        stroke-width: 2.5;
        opacity: 0.22;
        animation: pulse 4.2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { r: 74; opacity: 0.18; }
        50% { r: 85; opacity: 0.38; }
    }

    .label {
        fill: #e2e8f0;
        font-size: 15.5px;
        font-weight: 600;
        letter-spacing: 2.8px;
        text-anchor: middle;
        pointer-events: none;
        transition: all 0.3s ease;
        text-transform: uppercase;
    }

    .asset:hover .label {
        fill: white;
        font-size: 17px;
    }

    /* Central Brand Node */
    .central-asset .asset-ring {
        stroke: #f472b6;
    }

    .central-asset .asset-pulse {
        stroke: #f472b6;
    }

    /* Modal */
    #modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(11, 15, 23, 0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(12px);
    }

    .modal-content {
        background: #161b2b;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        width: 90%;
        max-width: 480px;
        padding: 50px 40px;
        text-align: center;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .modal-content h2 {
        font-size: 28px;
        margin: 0 0 16px 0;
        color: #a5b4fc;
    }

    .modal-content p {
        font-size: 17px;
        opacity: 0.8;
        line-height: 1.6;
        margin: 8px 0;
    }

    .modal-list {
        text-align: left;
        display: inline-block;
        margin: 20px 0;
        font-size: 16px;
        opacity: 0.9;
    }

    .bid-section {
        margin: 25px 0;
        padding: 20px;
        background: rgba(244, 114, 182, 0.1);
        border-radius: 16px;
        border: 1px solid rgba(244, 114, 182, 0.3);
    }

    .current-bid {
        font-size: 24px;
        font-weight: 700;
        color: #f472b6;
        margin: 12px 0;
    }

    .bid-btn {
        background: linear-gradient(90deg, #f472b6, #db2777);
        color: white;
        border: none;
        padding: 14px 40px;
        font-size: 17px;
        font-weight: 600;
        border-radius: 9999px;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.3s ease;
    }

    .bid-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(244, 114, 182, 0.6);
    }

    .close-btn {
        margin-top: 30px;
        padding: 12px 32px;
        background: transparent;
        border: 1px solid #64748b;
        color: #cbd5e1;
        border-radius: 9999px;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .close-btn:hover {
        background: #334155;
        border-color: #94a3b8;
        color: white;
    }

    .donate-section {
        margin-top: 35px;
        padding-top: 25px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .donate-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #1e2937;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 9999px;
        font-size: 15px;
        margin: 8px 4px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .donate-btn:hover {
        background: #334155;
        transform: translateY(-2px);
    }

    .title {
        position: absolute;
        top: 40px;
        font-size: 29px;
        font-weight: 700;
        letter-spacing: 7px;
        opacity: 0.95;
        text-transform: uppercase;
    }

    .footer {
        margin-top: 25px;
        opacity: 0.8;
        font-size: 13.8px;
        letter-spacing: 1px;
        text-align: center;
    }
</style>
</head>

<body>

<div class="title">Sustainable Asset Network — Web3</div>

<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">

    <!-- Connections -->
    <line class="line" x1="260" y1="420" x2="550" y2="180"/>
    <line class="line" x1="550" y1="180" x2="840" y2="420"/>
    <line class="line" x1="260" y1="420" x2="840" y2="420"/>

    <!-- New central connection lines to the middle node -->
    <line class="line" x1="550" y1="340" x2="260" y2="420"/>
    <line class="line" x1="550" y1="340" x2="550" y2="180"/>
    <line class="line" x1="550" y1="340" x2="840" y2="420"/>

    <defs>
        <clipPath id="clipAquatics">
            <circle cx="260" cy="420" r="74"/>
        </clipPath>
        <clipPath id="clipData">
            <circle cx="550" cy="180" r="84"/>
        </clipPath>
        <clipPath id="clipNursery">
            <circle cx="840" cy="420" r="66"/>
        </clipPath>
        <clipPath id="clipBrand">
            <circle cx="550" cy="340" r="78"/>
        </clipPath>
    </defs>

    <!-- AQUATICS -->
    <g class="asset" id="aquatics">
        <image 
            href="https://images.unsplash.com/photo-1544551763-46a013bb70d5" 
            x="186" y="346" width="148" height="148"
            clip-path="url(#clipAquatics)"
            preserveAspectRatio="xMidYMid slice"
            class="asset-image"
        />
        <circle class="asset-ring" cx="260" cy="420" r="74" stroke="#22d3ee"/>
        <circle class="asset-pulse" cx="260" cy="420" r="74" stroke="#22d3ee"/>
        <text class="label" x="260" y="528">AQUATICS</text>
    </g>

    <!-- DATA -->
    <g class="asset" id="data">
        <image 
            href="https://images.unsplash.com/photo-1551288049-bebda4e38f71" 
            x="466" y="96" width="168" height="168"
            clip-path="url(#clipData)"
            preserveAspectRatio="xMidYMid slice"
            class="asset-image"
        />
        <circle class="asset-ring" cx="550" cy="180" r="84" stroke="#8b5cf6"/>
        <circle class="asset-pulse" cx="550" cy="180" r="84" stroke="#8b5cf6"/>
        <text class="label" x="550" y="292">DATA</text>
    </g>

    <!-- NURSERY -->
    <g class="asset" id="nursery">
        <image 
            href="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735" 
            x="774" y="354" width="132" height="132"
            clip-path="url(#clipNursery)"
            preserveAspectRatio="xMidYMid slice"
            class="asset-image"
        />
        <circle class="asset-ring" cx="840" cy="420" r="66" stroke="#34d399"/>
        <circle class="asset-pulse" cx="840" cy="420" r="66" stroke="#34d399"/>
        <text class="label" x="840" y="518">NURSERY</text>
    </g>

    <!-- CENTRAL BRAND OWNERSHIP NODE -->
    <g class="asset central-asset" id="brand">
        <image 
            href="https://images.unsplash.com/photo-1558618666-fcd25c85cd64" 
            x="472" y="262" width="156" height="156"
            clip-path="url(#clipBrand)"
            preserveAspectRatio="xMidYMid slice"
            class="asset-image"
        />
        <circle class="asset-ring" cx="550" cy="340" r="78" stroke="#f472b6"/>
        <circle class="asset-pulse" cx="550" cy="340" r="78" stroke="#f472b6"/>
        <text class="label" x="550" y="458" style="font-size:14.5px; letter-spacing:2px;">BRAND OWNERSHIP</text>
    </g>

</svg>

<div class="footer">
    Click nodes to explore • Web3 Brand Bidding Live • 2× 1,000 gal Ponds
</div>

<!-- Modal -->
<div id="modal">
    <div class="modal-content">
        <h2 id="modal-title">Asset Details</h2>
        <p id="modal-asset-name" style="font-size:22px; font-weight:600; margin:20px 0 10px;"></p>
        
        <div id="modal-content-area">
            <!-- Dynamic content injected by JS -->
        </div>

        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const assets = document.querySelectorAll('.asset');
    const modal = document.getElementById('modal');
    const modalName = document.getElementById('modal-asset-name');
    const modalContentArea = document.getElementById('modal-content-area');

    assets.forEach(asset => {
        asset.addEventListener('click', () => {
            const id = asset.id;
            let name = '';
            let html = '';

            if (id === 'aquatics') {
                name = 'Aquatics Fund';
                html = `
                    <div class="modal-list">
                        <p><strong>Livestock Species Breeding:</strong> 5</p>
                        <p><strong>Plant Species:</strong> 7</p>
                        <p><strong>Indoor:</strong> ~700 Gallons</p>
                        <p><strong>Outdoor:</strong> 2 × 1,000 gal Ponds</p>
                    </div>
                    <p style="font-size:15px; margin-top:20px;">Growth estimates & feast planning in progress.</p>
                `;
            } 
            else if (id === 'data') {
                name = 'Data Vault';
                html = `
                    <div class="modal-list">
                        <p><strong>Blockchain Activity</strong></p>
                        <p><strong>Email Lists</strong></p>
                        <p><strong>Social Media Activity</strong></p>
                        <p><strong>SMS Lists</strong></p>
                    </div>
                    <p style="font-size:15px; margin-top:20px;">Full analytics coming soon.</p>
                `;
            } 
            else if (id === 'nursery') {
                name = 'Premium Nursery';
                html = `
                    <div class="modal-list">
                        <p><strong>Landscaping Plant Species:</strong> 4</p>
                        <p><strong>Tree Species:</strong> 1</p>
                    </div>
                `;
            } 
            else if (id === 'brand') {
                name = 'Brand Ownership Auction';
                html = `
                    <p style="font-size:18px; margin:15px 0 25px;">Test Round — Own this entire Web3 Project</p>
                    
                    <div class="bid-section">
                        <p>Current Highest Bid</p>
                        <div class="current-bid">0.85 ETH</div>
                        <p style="font-size:14px; opacity:0.7;">by 0xA1b2...c3D4</p>
                        
                        <button class="bid-btn" onclick="placeBid()">PLACE BID (1.0 ETH min)</button>
                    </div>
                    
                    <p style="font-size:14.5px; opacity:0.75; margin-top:20px;">
                        This is a test auction. Winning bidder gets full ownership rights, branding, assets, and future revenue share.
                    </p>
                `;
            }

            modalName.textContent = name;
            modalContentArea.innerHTML = html;
            modal.style.display = 'flex';
        });
    });

    function closeModal() {
        modal.style.display = 'none';
    }

    function placeBid() {
        alert("🚀 Web3 Bid Flow Started!\n\nIn the real version this would connect your wallet and process the bid on-chain.");
        // You can expand this with actual Web3.js / wagmi integration later
    }

    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
</script>

</body>
</html>
