<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UNPRINCIPLED - Sustainable Asset Network</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
	font-family:Inter,sans-serif;
	background:#040507;
	color:white;
	overflow:hidden;
}
canvas{
	position:fixed;
	inset:0;
	z-index:-3;
}
.aurora{
	position:fixed;
	width:900px;
	height:900px;
	border-radius:50%;
	filter:blur(140px);
	opacity:.12;
	z-index:-2;
	animation:drift 20s ease-in-out infinite alternate;
}
.aqua{background:#22d3ee;top:-250px;left:-250px;}
.purple{background:#a855f7;bottom:-250px;right:-250px;}
@keyframes drift{
	from{transform:translate(0,0)}
	to{transform:translate(120px,-80px)}
}
.hero{
	height:100vh;
	display:flex;
	flex-direction:column;
	align-items:center;
	justify-content:center;
	position:relative;
}
.brand{
	position:absolute;
	top:40px;
	left:50%;
	transform:translateX(-50%);
	text-align:center;
}
.brand h1{
	font-size:14px;
	letter-spacing:.5em;
	font-weight:600;
}
.brand p{
	color:rgba(255,255,255,.55);
	margin-top:12px;
}
svg{
	width:min(1000px,90vw);
	height:600px;
}
.line{
	stroke:rgba(255,255,255,.12);
	stroke-width:2;
}
.node{
	cursor:pointer;
	filter:drop-shadow(0 0 30px currentColor);
	animation:pulse 5s ease-in-out infinite;
}
@keyframes pulse{
	50%{transform:scale(1.08)}
}
.label{
	fill:white;
	font-size:16px;
	font-weight:600;
	text-anchor:middle;
}
.growth{
	fill:rgba(255,255,255,.6);
	font-size:14px;
	text-anchor:middle;
}
.modal{
	position:fixed;
	pointer-events:none;
	opacity:0;
	transform:translateY(10px);
	transition:.25s;
	width:320px;
	padding:24px;
	background:rgba(255,255,255,.06);
	backdrop-filter:blur(24px);
	border:1px solid rgba(255,255,255,.1);
	border-radius:24px;
	box-shadow:0 20px 80px rgba(0,0,0,.5);
}
.modal.show{
	opacity:1;
	transform:translateY(0);
}
.modal h3{
	margin-bottom:12px;
}
.modal ul{
	padding-left:18px;
	color:rgba(255,255,255,.8);
	line-height:1.7;
}
.footer{
	position:absolute;
	bottom:40px;
	left:50%;
	transform:translateX(-50%);
	text-align:center;
}
.footer h2{
	font-size:30px;
	font-weight:600;
	margin-bottom:12px;
}
.footer p{
	color:rgba(255,255,255,.55);
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="aurora aqua"></div>
<div class="aurora purple"></div>

<div class="hero">
	<div class="brand">
		<h1>UNPRINCIPLED INC</h1>
		<p>Sustainable Asset Network</p>
	</div>

	<svg viewBox="0 0 1000 600">
		<line class="line" x1="220" y1="400" x2="500" y2="170"/>
		<line class="line" x1="500" y1="170" x2="780" y2="400"/>
		<line class="line" x1="220" y1="400" x2="780" y2="400"/>

		<g class="asset" data-title="Aquatics" data-color="#22d3ee"
		data-items="Breeding Programs|Rare Guppy Lines|Endler Development|Shrimp Colonies|Aquascaping Projects|More Details Coming Soon">
			<circle class="node" cx="220" cy="400" r="55" fill="#22d3ee"/>
			<text class="label" x="220" y="490">AQUATICS</text>
			<text class="growth" x="220" y="515">-12%</text>
		</g>

		<g class="asset" data-title="Art" data-color="#a855f7"
		data-items="Digital Artwork|Physical Artwork|Music Projects|Generative Systems|Creative Research|More Details Coming Soon">
			<circle class="node" cx="500" cy="170" r="68" fill="#a855f7"/>
			<text class="label" x="500" y="275">ART</text>
			<text class="growth" x="500" y="300">+22.7%</text>
		</g>

		<g class="asset" data-title="Nursery" data-color="#34d399"
		data-items="Rare Plants|Propagation Programs|Native Species|Indoor Collections|Experimental Crosses|More Details Coming Soon">
			<circle class="node" cx="780" cy="400" r="42" fill="#34d399"/>
			<text class="label" x="780" y="490">NURSERY</text>
			<text class="growth" x="780" y="515">+11.2%</text>
		</g>
	</svg>

	<div class="footer">
		<h2>Growth At A Glance</h2>
		<p>Hover any node to explore the ecosystem.</p>
	</div>
</div>

<div id="modal" class="modal"></div>

<script>
const canvas=document.getElementById('stars');
const ctx=canvas.getContext('2d');
let stars=[];

function resize(){
	canvas.width=innerWidth;
	canvas.height=innerHeight;
	stars=[];
	for(let i=0;i<350;i++){
		stars.push({
			x:Math.random()*canvas.width,
			y:Math.random()*canvas.height,
			r:Math.random()*2,
			v:Math.random()*0.3+0.05
		});
	}
}
resize();
addEventListener('resize',resize);

function animate(){
	ctx.clearRect(0,0,canvas.width,canvas.height);
	for(const s of stars){
		s.y+=s.v;
		if(s.y>canvas.height)s.y=0;
		ctx.beginPath();
		ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
		ctx.fillStyle='rgba(255,255,255,.8)';
		ctx.fill();
	}
	requestAnimationFrame(animate);
}
animate();

const modal=document.getElementById('modal');

document.querySelectorAll('.asset').forEach(asset=>{
	asset.addEventListener('mousemove',e=>{
		const items=asset.dataset.items.split('|');
		modal.innerHTML=`
			<h3 style="color:${asset.dataset.color}">${asset.dataset.title}</h3>
			<ul>${items.map(x=>`<li>${x}</li>`).join('')}</ul>
		`;
		modal.style.left=(e.clientX+20)+'px';
		modal.style.top=(e.clientY-20)+'px';
		modal.classList.add('show');
	});
	asset.addEventListener('mouseleave',()=>{
		modal.classList.remove('show');
	});
});
</script>

</body>
</html>
