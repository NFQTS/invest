<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asset Network</title>

<style>
	body {
		margin: 0;
		background: #0b0f17;
		font-family: Arial, sans-serif;
		color: white;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		min-height: 100vh;
	}

	svg {
		width: 1100px;
		max-width: 95vw;
		height: auto;
	}

	.line {
		stroke: rgba(255,255,255,0.15);
		stroke-width: 2;
	}

	.asset {
		cursor: pointer;
	}

	/* image zoom ONLY (clean hover effect) */
	.asset image {
		transform-origin: center;
		transition: transform 0.35s ease, filter 0.35s ease;
		filter: brightness(1);
	}

	.asset:hover image {
		transform: scale(1.08);
		filter: brightness(1.1);
	}

	.asset circle {
		transition: stroke-width 0.25s ease, stroke 0.25s ease;
	}

	.asset:hover circle {
		stroke-width: 6;
	}

	.label {
		fill: white;
		font-size: 14px;
		text-anchor: middle;
		opacity: 0.8;
		letter-spacing: 1px;
		pointer-events: none;
	}

	.footer {
		margin-top: 20px;
		opacity: 0.6;
		font-size: 13px;
	}
</style>
</head>

<body>

<svg viewBox="0 0 1100 620">

	<!-- Connections -->
	<line class="line" x1="260" y1="420" x2="550" y2="180"/>
	<line class="line" x1="550" y1="180" x2="840" y2="420"/>
	<line class="line" x1="260" y1="420" x2="840" y2="420"/>

	<defs>
		<!-- Clip paths -->
		<clipPath id="clipAquatics">
			<circle cx="260" cy="420" r="68"/>
		</clipPath>

		<clipPath id="clipArt">
			<circle cx="550" cy="180" r="78"/>
		</clipPath>

		<clipPath id="clipNursery">
			<circle cx="840" cy="420" r="58"/>
		</clipPath>
	</defs>

	<!-- AQUATICS -->
	<g class="asset">
		<image
			href="https://images.unsplash.com/photo-1544551763-46a013bb70d5"
			x="192" y="352" width="136" height="136"
			clip-path="url(#clipAquatics)"
			preserveAspectRatio="xMidYMid slice"
		/>

		<circle cx="260" cy="420" r="68"
			fill="none" stroke="#22d3ee" stroke-width="4"/>

		<text class="label" x="260" y="515">AQUATICS</text>
	</g>

	<!-- ART -->
	<g class="asset">
		<image
			href="https://images.unsplash.com/photo-1526498460520-4c246339dccb"
			x="472" y="102" width="156" height="156"
			clip-path="url(#clipArt)"
			preserveAspectRatio="xMidYMid slice"
		/>

		<circle cx="550" cy="180" r="78"
			fill="none" stroke="#c026d3" stroke-width="4"/>

		<text class="label" x="550" y="285">ART</text>
	</g>

	<!-- NURSERY -->
	<g class="asset">
		<image
			href="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735"
			x="782" y="362" width="116" height="116"
			clip-path="url(#clipNursery)"
			preserveAspectRatio="xMidYMid slice"
		/>

		<circle cx="840" cy="420" r="58"
			fill="none" stroke="#34d399" stroke-width="4"/>

		<text class="label" x="840" y="515">NURSERY</text>
	</g>

</svg>

<div class="footer">
	Hover nodes • Focus zoom selection • Growth-scaled structure
</div>

</body>
</html>
